name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aiws
          POSTGRES_PASSWORD: aiws_local_password
          POSTGRES_DB: ai_workflow_studio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aiws -d ai_workflow_studio_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://aiws:aiws_local_password@localhost:5432/ai_workflow_studio_test
      CLERK_JWKS_URL: https://example-test.clerk.accounts.dev/.well-known/jwks.json
      CLERK_ISSUER: https://example-test.clerk.accounts.dev
      OPENAI_API_KEY: sk-test-placeholder
      CORS_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck & build
        run: npm run build

      - name: Test
        run: npm run test
