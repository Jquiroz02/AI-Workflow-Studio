# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: connect this repo in the Render dashboard and it will read this
# file automatically ("New +" -> "Blueprint"). Secrets marked `sync: false`
# must be filled in via the Render dashboard after the first deploy.
services:
  - type: web
    name: ai-workflow-studio-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        sync: false # set to your deployed Vercel URL, e.g. https://ai-workflow-studio.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: ai-workflow-studio-db
          property: connectionString
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"

databases:
  - name: ai-workflow-studio-db
    plan: free
    postgresMajorVersion: 16
