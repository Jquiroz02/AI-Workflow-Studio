services:
  - type: web
    name: ai-workflow-studio-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: API_V1_PREFIX
        value: /api/v1

      - key: DATABASE_URL
        sync: false

      - key: CORS_ORIGINS
        sync: false

      - key: CLERK_JWKS_URL
        sync: false

      - key: CLERK_ISSUER
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini

      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small

      - key: UPLOAD_DIR
        value: /app/uploads

      - key: MAX_UPLOAD_SIZE_MB
        value: "20"
